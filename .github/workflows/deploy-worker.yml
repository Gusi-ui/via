name: Deploy Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-worker-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Versions
        run: node -v && npm -v

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_LOG: warn
        run: npx wrangler deploy dist/server/entry.mjs --config wrangler.toml --assets dist/client
